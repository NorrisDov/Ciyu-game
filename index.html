<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>词愈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <div id="bg-layer">
    <img id="bg-img" class="bg-image active" src="" alt="">
    <div class="bg-overlay"></div>
  </div>
  <div id="chars-layer"></div>
  <div class="screen-noise" id="screen-noise"></div>
  
  <!-- Title Screen -->
  <div id="title-screen">
    <h1>词·愈</h1>
    <div class="subtitle">一个关于记忆与词语的游戏</div>
    <div class="tagline">你是一个名为 LINK-1 的人工智能。<br>你的任务是学习词语之间的关联。</div>
    <button id="start-btn" onclick="window.game.start()">开始游戏</button>
    <div class="click-hint">点击开始</div>
  </div>
  
  <!-- Act Header -->
  <div id="act-header">
    <h2 id="act-title"></h2>
  </div>
  
  <!-- System Log -->
  <div id="system-log"></div>
  
  <!-- Stats -->
  <div id="stats-display"></div>
  
  <!-- Training Container -->
  <div class="train-container" id="train-container">
    <div class="train-title" id="train-title"></div>
    <div id="train-trainer"></div>
    <div id="train-pairs"></div>
    <div id="train-repeat"></div>
    <div id="train-note" class="train-note"></div>
    <div id="train-complete" class="train-complete"></div>
  </div>
  
  <!-- Spelling Area -->
  <div id="spelling-area">
    <div class="built-text">
      <span class="built-label">已拼：</span>
      <div class="built-chars" id="built-chars"></div>
    </div>
    <div class="choice-grid" id="choice-grid"></div>
  </div>
  
  <!-- Dialog Area -->
  <div id="dialog-area">
    <div id="dialog-box">
      <div id="dialog-lines"></div>
    </div>
    <div id="continue-prompt"><span>▼ 点击继续</span></div>
  </div>
  
  <!-- Act Transition -->
  <div id="act-transition">
    <h2 id="transition-text"></h2>
  </div>
  
  <!-- Garbled Overlay -->
  <div id="garbled-overlay">
    <div id="garbled-lines"></div>
    <div class="garbled-msg" id="garbled-msg"></div>
    <div class="garbled-sigh" id="garbled-sigh-text"></div>
  </div>
  
  <!-- Aftermath Overlay -->
  <div id="aftermath-overlay">
    <div class="am-bg"></div>
    <div id="aftermath-lines"></div>
  </div>
  
  <!-- Revelation Overlay -->
  <div id="revelation-overlay">
    <div id="revelation-lines"></div>
  </div>
  
  <!-- Final Overlay -->
  <div id="final-overlay">
    <div id="final-lines"></div>
  </div>
  
  <!-- Ending Overlay -->
  <div id="ending-overlay">
    <div id="ending-bg">
      <img class="ending-bg-img" id="ending-bg-a" src="" alt="">
      <img class="ending-bg-img" id="ending-bg-b" src="" alt="">
    </div>
    <div id="ending-lines"></div>
  </div>
  
  <!-- Credits -->
  <div id="credits-overlay">
    <h2>感谢游玩</h2>
    <p>词 · 愈</p>
    <p style="margin-top:3rem;color:rgba(212,165,116,0.5);font-size:1rem;">一个关于记忆与词语的游戏</p>
    <p style="margin-top:4rem;color:rgba(245,230,211,0.3);font-size:0.9rem;">— 2026 —</p>
  </div>
</div>

<script src="game_data.js"></script>
<script src="game.js"></script>
</body>
</html>
